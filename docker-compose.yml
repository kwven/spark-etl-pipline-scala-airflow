services:
  postgres:
    build:
      context: ./infra/postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    container_name: project-spark-postgres

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    restart: always
    env_file:
      - ./infra/hadoop/hadoop.env
    environment:
      CLUSTER_NAME: project-spark-hdfs
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
      - ./data/input:/project/input:ro
      - ./data/output/hdfs-parquet:/project/export-parquet
      - ./data/output/hdfs-csv:/project/export-csv
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/localhost/9870'"]
      interval: 10s
      timeout: 5s
      retries: 15
    container_name: project-spark-namenode

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    restart: always
    env_file:
      - ./infra/hadoop/hadoop.env
    environment:
      SERVICE_PRECONDITION: namenode:9870
    depends_on:
      namenode:
        condition: service_healthy
    ports:
      - "9864:9864"
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    container_name: project-spark-datanode

  spark-submit:
    image: spark:3.5.1-scala2.12-java17-ubuntu
    working_dir: /opt/project
    depends_on:
      postgres:
        condition: service_healthy
      namenode:
        condition: service_healthy
      datanode:
        condition: service_started
    volumes:
      - ./:/opt/project
    entrypoint: ["/bin/bash", "-lc"]

  airflow:
    build:
      context: ./infra/airflow
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      namenode:
        condition: service_healthy
      datanode:
        condition: service_started
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
      PROJECT_HOST_ROOT: "${PROJECT_HOST_ROOT}"
    user: "${AIRFLOW_UID:-50000}:0"
    group_add:
      - "${DOCKER_GID:-998}"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
      - ./:/opt/project
      - ${PROJECT_HOST_ROOT}:${PROJECT_HOST_ROOT}
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 20
    command: standalone
    container_name: project-spark-airflow

volumes:
  postgres_data:
  hadoop_namenode:
  hadoop_datanode:
